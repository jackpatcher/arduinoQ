<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Q SERVO WebUI (4 Channels)</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 35px 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .description {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        /* ส่วนแสดงสถานะปัจจุบัน */
        .status-panel {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .status-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #95a5a6;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .status-value {
            font-size: 20px;
            font-weight: bold;
            color: #3498db;
            transition: color 0.3s ease;
        }

        /* กลุ่มปุ่มตั้งค่าองศา */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* การ์ดรวม input + ปุ่มกด */
        .control-row {
            display: flex;
            background-color: #ffffff;
            border: 2px solid #3498db;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .control-row:focus-within {
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.25);
            transform: translateY(-2px);
        }

        /* ช่องกรอกตัวเลของศา */
        .degree-input {
            width: 40%;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            background-color: #fcfcfc;
            outline: none;
            border-right: 1px dashed #3498db;
        }
        /* ซ่อนลูกศรเพิ่มลดของ input type=number ให้ดูคลีน */
        .degree-input::-webkit-outer-spin-button,
        .degree-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ปุ่มกดสั่งงาน */
        .servo-btn {
            width: 60%;
            border: none;
            background-color: #ffffff;
            color: #3498db;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }
        .servo-btn:hover {
            background-color: #3498db;
            color: #ffffff;
        }
        .servo-btn:active {
            background-color: #2980b9;
        }

        /* คลาสสีพิเศษสำหรับปุ่มที่กำลังทำงานล่าสุด */
        .row-active {
            border-color: #2ecc71 !important;
        }
        .row-active .degree-input {
            background-color: #e8f8f5;
            border-right: 1px dashed #2ecc71;
        }
        .row-active .servo-btn {
            background-color: #2ecc71;
            color: white;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>UNO Q Servo Custom</h2>
        <p class="description">
            แก้ไขตัวเลขอินพุตซ้ายมือได้อิสระ แล้วกดปุ่มขวามือเพื่อส่งคำสั่งผ่าน WebSocket ไปยัง Python เพื่อควบคุม Servo
        </p>

        <div class="status-panel">
            <div class="status-title">Last Command Status</div>
            <div id="statusDisplay" class="status-value">READY</div>
        </div>

        <div class="button-group">
            
            <div class="control-row" id="row1">
                <input type="number" class="degree-input" id="deg1" value="0" min="0" max="180" placeholder="องศา">
                <button class="servo-btn" onclick="sendServo('deg1', 'row1')">➔ สั่งหมุนมุมนี้</button>
            </div>

            <div class="control-row" id="row2">
                <input type="number" class="degree-input" id="deg2" value="10" min="0" max="180" placeholder="องศา">
                <button class="servo-btn" onclick="sendServo('deg2', 'row2')">➔ สั่งหมุนมุมนี้</button>
            </div>

            <div class="control-row" id="row3">
                <input type="number" class="degree-input" id="deg3" value="45" min="0" max="180" placeholder="องศา">
                <button class="servo-btn" onclick="sendServo('deg3', 'row3')">➔ สั่งหมุนมุมนี้</button>
            </div>

            <div class="control-row" id="row4">
                <input type="number" class="degree-input" id="deg4" value="90" min="0" max="180" placeholder="องศา">
                <button class="servo-btn" onclick="sendServo('deg4', 'row4')">➔ สั่งหมุนมุมนี้</button>
            </div>

        </div>
    </div>

    <script src="libs/socket.io.min.js"></script>
    <script>
        // Connect to the WebUI Brick server
        const socket = io();

        // ฟังก์ชันดึงค่าจากช่อง Input ที่กด แล้วส่งไป Python
        function sendServo(inputId, rowId) {
            // ดึงค่าตัวเลขจากช่อง input ปัจจุบันมาแปลงเป็น Integer
            const inputVal = document.getElementById(inputId).value;
            const targetDeg = parseInt(inputVal) || 0; // ถ้าเป็นค่าว่าง ให้ส่งเป็น 0

            // ส่งข้อมูลออกทาง WebSocket ด้วยลอจิกเดิมของคุณ
            socket.emit("servoPyDeg", {
                deg: targetDeg
            });

            // ปรับหน้าตาหน้าจอทันทีเมื่อกดส่ง (UI Feedback)
            updateUI(targetDeg, rowId);
        }

        // ฟังก์ชันช่วยเปลี่ยนสีและข้อความสถานะบนหน้าจอ
        function updateUI(currentDeg, activeRowId) {
            const statusDisplay = document.getElementById("statusDisplay");
            
            // อัปเดตข้อความด้านบน
            statusDisplay.innerHTML = `SERVO TARGET: ${currentDeg}°`;
            
            // ล้างสีเขียวไฮไลต์ (row-active) ออกจากทุกแถวก่อน
            document.querySelectorAll('.control-row').forEach(row => {
                row.classList.remove('row-active');
            });

            // เพิ่มสีเขียวไฮไลต์เฉพาะแถวที่เรากดสั่งงานล่าสุด
            if(activeRowId) {
                document.getElementById(activeRowId).classList.add('row-active');
            }
        }

        // ลอจิกรับสถานะกลับมาจาก Python (กรณีส่งย้อนกลับมาเช็ค)
        socket.on("led_status_update", function(data){
            if (data && data.deg !== undefined) {
                const statusDisplay = document.getElementById("statusDisplay");
                statusDisplay.innerHTML = `CURRENT POSITION: ${data.deg}°`;
            }
        }); 
    </script>
</body>
</html>
